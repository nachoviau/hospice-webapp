<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=0.9, minimum-scale=0.7, maximum-scale=1.5, user-scalable=no" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="San Camilo" />
    <!-- Meta tags para evitar cache -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>San Camilo</title>
    <script>
      (function() {
        try {
          var host = window.location.host;
          var href = window.location.href;
          var qs = window.location.search || '';
          var isDevHost = /^(localhost|127\.0\.0\.1|0\.0\.0\.0)(:\d+)?$/.test(host);
          var isPreview = host.includes('--'); // firebase preview channels
          var skip = qs.includes('no-redirect');
          var target = 'hospice-san-camilo.web.app';
          if (!isDevHost && !isPreview && !skip && host !== target) {
            var url = href.replace(host, target);
            window.location.replace(url);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
